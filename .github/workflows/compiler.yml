name: Compilar EXE e Linux via Issue

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  # --- TRABALHO 1: COMPILAR PARA WINDOWS (COM ÍCONE E FORNECEDOR) ---
  build-windows:
    if: contains(github.event.issue.title, 'Compile AGOR-') || contains(github.event.comment.body, 'Compile AGOR-')
    runs-on: windows-latest
    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o compilador MSVC (Windows)
      uses: ilammy/msvc-dev-cmd@v1

    - name: Criar pasta temporária
      run: mkdir win-out

    - name: Compilar o arquivo de recursos (Ícone e Fornecedor)
      run: |
        rc.exe /fo code/compile/resources.res code/compile/resources.rc

    - name: Compilar o executável Windows juntando o ícone
      run: |
        cl.exe /EHsc /std:c++17 code/compile/main.cpp code/compile/resources.res /Fe:win-out/msit.exe

    - name: Salvar executável do Windows temporariamente
      uses: actions/upload-artifact@v4
      with:
        name: win-artifact
        path: win-out/msit.exe

  # --- TRABALHO 2: COMPILAR PARA LINUX (X86_64 E ARM64) E ENVIAR TUDO ---
  build-linux-and-upload:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Baixar o executável do Windows gerado no passo anterior
      uses: actions/download-artifact@v4
      with:
        name: win-artifact
        path: code/compiled

    - name: Instalar compiladores G++ (Padrão e Cross-Compilador ARM64)
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ g++-aarch64-linux-gnu

    - name: Criar a pasta de destino se não existir
      run: mkdir -p code/compiled

    - name: Compilar para Linux Desktop (x86_64)
      run: |
        g++ -std=c++17 code/compile/main.cpp -o code/compiled/msit

    - name: Compilar para Linux ARM64 (Compatível com Termux)
      run: |
        aarch64-linux-gnu-g++ -std=c++17 code/compile/main.cpp -o code/compiled/msit_arm64

    - name: Enviar os arquivos de volta para o repositório (code/compiled)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add code/compiled/msit.exe code/compiled/msit code/compiled/msit_arm64
        git commit -m "Auto: Executáveis (Windows, Linux x64, Linux ARM64) atualizados via Issue #${{ github.event.issue.number }}"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Responder na Issue avisando que salvou todos os arquivos
      uses: actions/github-script@v7
      with:
        script: |
          const issueNumber = context.issue.number;
          const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
          const folderUrl = `${repoUrl}/tree/main/code/compiled`;
          
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            body: `### ✅ Compilação Multiplataforma Concluída!\n\nOs seus executáveis foram gerados com sucesso:\n\n* 🖥️ **Windows:** \`msit.exe\` (Com ícone/fornecedor embutidos)\n* 🐧 **Linux PC (x86_64):** \`msit\`\n* 📱 **Linux Mobile (ARM64/Termux):** \`msit_arm64\`\n\n[📂 Clique aqui para abrir a pasta code/compiled](${folderUrl})`
          });
          
